name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm validate
      - run: pnpm package --out strange-theme-ci.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: strange-theme-vsix
          path: strange-theme-ci.vsix
          if-no-files-found: error
