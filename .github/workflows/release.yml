name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump patch version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(node -p "const v=require('./package.json').version.split('.');v[2]=parseInt(v[2])+1;v.join('.')")
          node -e "let f=require('./package.json');f.version='$NEW';require('fs').writeFileSync('package.json',JSON.stringify(f,null,2)+'\n')"
          echo "VERSION=$NEW" >> $GITHUB_ENV
          echo "Bumped $CURRENT -> $NEW"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ env.VERSION }} [skip ci]"
          git push

      - name: Build VSIX
        run: npx @vscode/vsce package -o "strange-theme-${{ env.VERSION }}.vsix"

      - name: Create Git Tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          body_path: release-notes.md
          files: "*.vsix"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set — skipping VS Code Marketplace publish"
          else
            npx @vscode/vsce publish --packagePath "strange-theme-${{ env.VERSION }}.vsix" -p "$VSCE_PAT"
          fi

      - name: Publish to Open VSX (Cursor / Trae)
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -z "$OPEN_VSX_TOKEN" ]; then
            echo "OPEN_VSX_TOKEN not set — skipping Open VSX publish"
          else
            npx ovsx publish "strange-theme-${{ env.VERSION }}.vsix" -p "$OPEN_VSX_TOKEN"
          fi
